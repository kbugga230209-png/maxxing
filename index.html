<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Heavenly AI Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

<style>

body{
margin:0;
background:#050507;
font-family:Inter;
color:white;
overflow-x:hidden;
}

/* cosmic glow */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 50% 20%,rgba(201,169,110,.4),transparent 60%);
z-index:-3;
}

/* particle canvas */

#bg{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* glass spheres */

.glass{
position:fixed;
border-radius:50%;
background:rgba(255,255,255,.06);
backdrop-filter:blur(40px);
border:1px solid rgba(255,255,255,.2);
box-shadow:0 0 120px rgba(201,169,110,.4);
animation:float 12s infinite ease-in-out;
}

.g1{width:200px;height:200px;top:15%;left:10%;}
.g2{width:140px;height:140px;top:70%;left:85%;}
.g3{width:180px;height:180px;top:80%;left:25%;}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-50px)}
100%{transform:translateY(0)}
}

/* hero */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
padding:50px;
border-radius:20px;
border:1px solid rgba(201,169,110,.4);
box-shadow:0 0 140px rgba(201,169,110,.25);
animation:float 6s infinite ease-in-out;
}

h1{
font-family:Cinzel;
font-size:64px;
letter-spacing:2px;
margin:0;
}

button{
margin-top:25px;
padding:12px 28px;
background:#c9a96e;
border:none;
color:black;
border-radius:8px;
font-weight:600;
cursor:pointer;
box-shadow:0 0 20px rgba(201,169,110,.5);
}

/* sections */

.section{
padding:100px 10%;
text-align:center;
}

/* scanner */

.preview{
position:relative;
display:inline-block;
}

video{
width:320px;
border-radius:10px;
}

canvas.mesh{
position:absolute;
top:0;
left:0;
}

/* scan beam */

.scan{
position:absolute;
width:100%;
height:3px;
background:#c9a96e;
animation:scan 2s linear infinite;
}

@keyframes scan{
0%{top:0}
100%{top:100%}
}

/* results */

.metrics{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:12px;
border:1px solid rgba(201,169,110,.3);
width:160px;
}

.score{
font-size:48px;
color:#c9a96e;
margin-top:20px;
}

.hidden{display:none}

/* tips */

.tips{
margin-top:40px;
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.tip{
background:rgba(255,255,255,.05);
padding:18px;
border-radius:10px;
border:1px solid rgba(201,169,110,.3);
width:220px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="glass g1"></div>
<div class="glass g2"></div>
<div class="glass g3"></div>

<section class="hero">

<div class="hero-card">

<h1>HEAVENLY</h1>
<p>AI Aesthetic Analyzer</p>

<button onclick="startScan()">Start Scan</button>

</div>

</section>

<section class="section">

<h2>Face Scanner</h2>

<div class="preview">

<video id="video" autoplay muted></video>
<canvas class="mesh" id="mesh"></canvas>
<div class="scan"></div>

</div>

<p id="status">Press Start Scan</p>

</section>

<section id="results" class="section hidden">

<h2>Your Results</h2>

<div class="score" id="overall"></div>

<div class="metrics">

<div class="card"><h3>Symmetry</h3><p id="sym"></p></div>
<div class="card"><h3>Jawline</h3><p id="jaw"></p></div>
<div class="card"><h3>Eyes</h3><p id="eyes"></p></div>
<div class="card"><h3>Skin</h3><p id="skin"></p></div>

</div>

<div class="tips" id="tips"></div>

</section>

<script>

/* 3D particles */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer({
canvas:document.querySelector("#bg"),
alpha:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

camera.position.z=5

const geo=new THREE.BufferGeometry()
const count=2000
const pos=new Float32Array(count*3)

for(let i=0;i<count*3;i++){
pos[i]=(Math.random()-.5)*20
}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3))

const mat=new THREE.PointsMaterial({
color:0xc9a96e,
size:.04
})

const stars=new THREE.Points(geo,mat)

scene.add(stars)

function animate(){
requestAnimationFrame(animate)
stars.rotation.y+=.0006
renderer.render(scene,camera)
}

animate()

/* scan */

let scanned=false

async function startScan(){

document.getElementById("status").innerText="Initializing scanner..."

const video=document.getElementById("video")
const canvas=document.getElementById("mesh")
const ctx=canvas.getContext("2d")

const stream=await navigator.mediaDevices.getUserMedia({video:true})
video.srcObject=stream

const faceMesh=new FaceMesh({
locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
})

faceMesh.setOptions({
maxNumFaces:1,
refineLandmarks:true
})

faceMesh.onResults(results=>{

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.clearRect(0,0,canvas.width,canvas.height)

if(results.multiFaceLandmarks){

const landmarks=results.multiFaceLandmarks[0]

drawConnectors(
ctx,
landmarks,
FACEMESH_TESSELATION,
{color:"#C9A96E",lineWidth:1}
)

document.getElementById("status").innerText="Face detected"

if(!scanned){
scanned=true
setTimeout(showResults,2000)
}

}

})

const camera=new Camera(video,{
onFrame:async()=>{
await faceMesh.send({image:video})
},
width:320,
height:320
})

camera.start()

}

/* scoring */

function rand(){
return (Math.random()*3+6).toFixed(1)
}

function showResults(){

const sym=rand()
const jaw=rand()
const eyes=rand()
const skin=rand()

document.getElementById("sym").innerText=sym
document.getElementById("jaw").innerText=jaw
document.getElementById("eyes").innerText=eyes
document.getElementById("skin").innerText=skin

const overall=((+sym + +jaw + +eyes + +skin)/4).toFixed(1)

document.getElementById("overall").innerText=overall+"/10"

document.getElementById("results").classList.remove("hidden")

generateTips(sym,jaw,eyes,skin)

}

/* tips */

function generateTips(sym,jaw,eyes,skin){

const tips=[]

if(jaw<6)tips.push("Grow light stubble to enhance jawline.")
if(skin<6)tips.push("Improve hydration and skincare.")
if(eyes<6)tips.push("Improve sleep schedule and grooming.")
if(sym<6)tips.push("Balanced hairstyles improve symmetry.")

if(tips.length===0){
tips.push("Your facial balance looks strong. Maintain good grooming habits.")
}

const box=document.getElementById("tips")
box.innerHTML=""

tips.forEach(t=>{
const div=document.createElement("div")
div.className="tip"
div.innerText=t
box.appendChild(div)
})

}

</script>

</body>
</html>
