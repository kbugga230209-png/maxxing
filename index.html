<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Heavenly AI Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>

body{
margin:0;
font-family:Inter;
background:#05060c;
color:white;
overflow-x:hidden;
}

/* hero halo */

body::before{
content:"";
position:fixed;
width:800px;
height:800px;
top:-200px;
left:50%;
transform:translateX(-50%);
background:radial-gradient(circle,rgba(201,169,110,.45),transparent 60%);
filter:blur(140px);
z-index:-5;
}

/* threejs canvas */

#bg{
position:fixed;
top:0;
left:0;
z-index:-4;
}

/* glass spheres */

.glass{

position:fixed;

border-radius:50%;

background:
radial-gradient(circle at 30% 30%,
rgba(255,255,255,.6),
rgba(255,255,255,.15) 40%,
transparent 70%);

border:1px solid rgba(255,255,255,.3);

box-shadow:
inset 0 0 40px rgba(255,255,255,.5),
0 0 120px rgba(201,169,110,.4);

backdrop-filter:blur(80px);

animation:float 8s ease-in-out infinite;

z-index:-3;
}

.g1{width:220px;height:220px;top:20%;left:5%;}
.g2{width:160px;height:160px;top:70%;left:85%;}
.g3{width:260px;height:260px;top:85%;left:30%;}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-50px)}
100%{transform:translateY(0)}
}

/* navbar */

.nav{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:40px;
padding:14px 36px;
border-radius:40px;
background:rgba(20,20,30,.6);
backdrop-filter:blur(40px);
border:1px solid rgba(255,255,255,.15);
z-index:10;
}

.logo{
font-family:Cinzel;
letter-spacing:4px;
}

/* hero */

.hero{
padding-top:180px;
display:flex;
justify-content:center;
}

.hero-card{

width:80%;
max-width:520px;

padding:70px;

border-radius:40px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(60px);

text-align:center;

box-shadow:0 0 120px rgba(201,169,110,.3);

}

.badge{
border:1px solid rgba(255,255,255,.2);
border-radius:30px;
padding:8px 18px;
display:inline-block;
font-size:12px;
letter-spacing:2px;
color:#bbb;
margin-bottom:20px;
}

h1{
font-family:Cinzel;
font-size:54px;
letter-spacing:3px;
}

.subtitle{
letter-spacing:3px;
color:#d2b26f;
margin-bottom:10px;
}

/* upload */

.upload{
margin-top:40px;
border:2px dashed rgba(255,255,255,.2);
border-radius:30px;
padding:60px;
background:rgba(255,255,255,.06);
cursor:pointer;
}

.upload input{
display:none;
}

canvas{
max-width:100%;
border-radius:20px;
margin-top:20px;
}

/* cards */

.card{
margin:40px auto;
padding:40px;
max-width:400px;
background:rgba(255,255,255,.06);
border-radius:30px;
border:1px solid rgba(255,255,255,.15);
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="glass g1"></div>
<div class="glass g2"></div>
<div class="glass g3"></div>

<div class="nav">
<div class="logo">HEAVENLY</div>
</div>

<div class="hero">

<div class="hero-card">

<div class="badge">DIVINE INTELLIGENCE · FUTURISTIC AESTHETICS</div>

<h1>HEAVENLY</h1>

<div class="subtitle">AI AESTHETIC ANALYZER</div>

<div class="upload" id="uploadBox">

<input type="file" id="imageUpload" accept="image/*">

Upload Face

</div>

<canvas id="mesh"></canvas>

</div>

</div>

<div class="card" id="results">
Upload image to analyze
</div>

<div class="card" id="tips">
Tips appear here
</div>

<script>

/* threejs starfield */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)

const renderer=new THREE.WebGLRenderer({
canvas:document.getElementById("bg"),
alpha:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

camera.position.z=5

const geometry=new THREE.BufferGeometry()

const vertices=[]

for(let i=0;i<5000;i++){

vertices.push(
Math.random()*2000-1000,
Math.random()*2000-1000,
Math.random()*2000-1000
)

}

geometry.setAttribute('position',new THREE.Float32BufferAttribute(vertices,3))

const material=new THREE.PointsMaterial({
color:0xffffff,
size:2
})

const stars=new THREE.Points(geometry,material)

scene.add(stars)

function animate(){

requestAnimationFrame(animate)

stars.rotation.y+=0.0005

renderer.render(scene,camera)

}

animate()

/* face detection */

const upload=document.getElementById("imageUpload")
const canvas=document.getElementById("mesh")
const ctx=canvas.getContext("2d")

const faceMesh=new FaceMesh({
locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
})

faceMesh.setOptions({
maxNumFaces:1,
refineLandmarks:true
})

faceMesh.onResults(results=>{

if(results.multiFaceLandmarks){

drawConnectors(
ctx,
results.multiFaceLandmarks[0],
FACEMESH_TESSELATION,
{color:"#c9a96e",lineWidth:1}
)

generateResults()

}

})

upload.onchange=async()=>{

const file=upload.files[0]

if(!file)return

const img=new Image()

img.src=URL.createObjectURL(file)

img.onload=async()=>{

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

await faceMesh.send({image:img})

}

}

function generateResults(){

const score=(Math.random()*2+7).toFixed(1)

document.getElementById("results").innerHTML=
`Overall Score: ${score}/10`

document.getElementById("tips").innerHTML=
`Improve lighting in photos<br>Maintain skincare routine<br>Balanced hairstyle`

}

</script>

</body>
</html>
