<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Heavenly | AI Aesthetic Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1/bundled/lenis.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0A0A0F;
color:white;
overflow-x:hidden;
}

canvas#bg{
position:fixed;
top:0;
left:0;
z-index:-2;
}

.glass{
position:fixed;
border-radius:50%;
background:rgba(255,255,255,0.07);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 0 80px rgba(201,169,110,0.35);
animation:float 12s infinite ease-in-out;
z-index:-1;
}

.g1{width:180px;height:180px;top:20%;left:8%;}
.g2{width:120px;height:120px;top:60%;left:85%;}
.g3{width:220px;height:220px;top:75%;left:20%;}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(16px);
padding:40px;
border-radius:18px;
border:1px solid rgba(201,169,110,0.4);
box-shadow:0 0 90px rgba(201,169,110,0.15);
}

h1{
font-family:'Cinzel',serif;
font-size:58px;
}

button{
padding:12px 25px;
margin:10px;
border:1px solid #C9A96E;
background:transparent;
color:white;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#C9A96E;
color:black;
}

.section{
padding:80px 10%;
text-align:center;
}

video, canvas#mesh{
width:300px;
border-radius:12px;
}

.preview{
position:relative;
display:inline-block;
}

#mesh{
position:absolute;
left:0;
top:0;
}

.metrics{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
width:170px;
border:1px solid rgba(201,169,110,0.4);
}

.tips{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.tip{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:10px;
width:230px;
border:1px solid rgba(201,169,110,0.4);
}

.hidden{
display:none;
}

footer{
text-align:center;
padding:40px;
opacity:.6;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="glass g1"></div>
<div class="glass g2"></div>
<div class="glass g3"></div>

<section class="hero">

<div class="hero-card">

<h1>HEAVENLY</h1>
<p>AI Aesthetic Analyzer</p>
<p>Discover your aesthetic potential</p>

<button onclick="document.getElementById('scan').scrollIntoView()">Scan My Face</button>

</div>

</section>

<section id="scan" class="section">

<h2>Face Scanner</h2>

<div class="preview">

<video id="video" autoplay muted></video>
<canvas id="mesh"></canvas>

</div>

<p id="status">Initializing AI scanner...</p>

</section>

<section id="results" class="section hidden">

<h2>Your Results</h2>

<div id="overallScore" style="font-size:44px;color:#C9A96E"></div>

<div class="metrics">

<div class="card"><h3>Symmetry</h3><p id="sym"></p></div>
<div class="card"><h3>Jawline</h3><p id="jaw"></p></div>
<div class="card"><h3>Eyes</h3><p id="eyes"></p></div>
<div class="card"><h3>Skin</h3><p id="skin"></p></div>

</div>

</section>

<section class="section">

<h2>Improvement Tips</h2>

<div class="tips" id="tipsBox"></div>

</section>

<footer>

<p>Heavenly</p>
<p>Discover your aesthetic potential</p>

</footer>

<script>

/* smooth scroll */

const lenis = new Lenis()
function raf(time){
lenis.raf(time)
requestAnimationFrame(raf)
}
requestAnimationFrame(raf)

/* 3D particles */

const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)

const renderer=new THREE.WebGLRenderer({
canvas:document.querySelector("#bg"),
alpha:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

camera.position.z=5

const geometry=new THREE.BufferGeometry()
const count=2000
const pos=new Float32Array(count*3)

for(let i=0;i<count*3;i++){
pos[i]=(Math.random()-0.5)*20
}

geometry.setAttribute("position",new THREE.BufferAttribute(pos,3))

const material=new THREE.PointsMaterial({
color:0xc9a96e,
size:0.03
})

const points=new THREE.Points(geometry,material)
scene.add(points)

function animate(){
requestAnimationFrame(animate)
points.rotation.y+=0.0006
points.rotation.x+=0.0003
renderer.render(scene,camera)
}
animate()

/* face mesh */

const video=document.getElementById("video")
const canvas=document.getElementById("mesh")
const ctx=canvas.getContext("2d")

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream
})

const faceMesh=new FaceMesh({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
}
})

faceMesh.setOptions({
maxNumFaces:1,
refineLandmarks:true
})

faceMesh.onResults(results=>{

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.clearRect(0,0,canvas.width,canvas.height)

if(results.multiFaceLandmarks){

const points=results.multiFaceLandmarks[0]

ctx.strokeStyle="#C9A96E"

points.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x*canvas.width,p.y*canvas.height,1.5,0,2*Math.PI)
ctx.stroke()
})

analyzeFace()

}

})

const cam=new Camera(video,{
onFrame:async()=>{
await faceMesh.send({image:video})
},
width:300,
height:300
})

cam.start()

function rand(){
return (Math.random()*3+6).toFixed(1)
}

function analyzeFace(){

document.getElementById("status").innerText="Analyzing face..."

setTimeout(()=>{

const sym=rand()
const jaw=rand()
const eyes=rand()
const skin=rand()

document.getElementById("sym").innerText=sym
document.getElementById("jaw").innerText=jaw
document.getElementById("eyes").innerText=eyes
document.getElementById("skin").innerText=skin

const overall=((+sym + +jaw + +eyes + +skin)/4).toFixed(1)

document.getElementById("overallScore").innerText=overall+"/10"

document.getElementById("results").classList.remove("hidden")

tips(sym,jaw,eyes,skin)

},2000)

}

function tips(sym,jaw,eyes,skin){

const tips=[]

if(jaw<6)tips.push("Consider beard or stubble styles to strengthen jawline.")
if(skin<6)tips.push("Improve hydration and maintain a skincare routine.")
if(eyes<6)tips.push("Improve sleep schedule and groom eyebrows.")
if(sym<6)tips.push("Balanced hairstyles can improve facial symmetry.")

if(tips.length===0){
tips.push("Your facial balance looks strong. Maintain good grooming habits.")
}

const box=document.getElementById("tipsBox")
box.innerHTML=""

tips.forEach(t=>{
const div=document.createElement("div")
div.className="tip"
div.innerText=t
box.appendChild(div)
})

}

</script>

</body>
</html>
