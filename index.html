<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Heavenly Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>

body{
margin:0;
font-family:Inter;
background:#05060c;
color:white;
text-align:center;
}

h1{
font-family:Cinzel;
letter-spacing:3px;
}

.upload{
margin:40px auto;
width:260px;
padding:30px;
border:2px dashed #aaa;
border-radius:20px;
cursor:pointer;
}

.upload input{
display:none;
}

canvas{
max-width:90%;
border-radius:20px;
margin-top:20px;
}

.card{
margin:40px auto;
padding:30px;
width:300px;
background:rgba(255,255,255,.05);
border-radius:20px;
}

</style>

</head>

<body>

<h1>HEAVENLY</h1>

<div class="upload" id="uploadBox">
<input type="file" id="imageUpload" accept="image/*">
Upload Image
</div>

<canvas id="canvas"></canvas>

<div class="card" id="results">
Upload a face to analyze
</div>

<div class="card" id="tips">
Tips will appear here
</div>

<script>

const uploadBox=document.getElementById("uploadBox")
const uploadInput=document.getElementById("imageUpload")

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

uploadBox.onclick=()=>uploadInput.click()

const faceMesh=new FaceMesh({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
})

faceMesh.setOptions({
maxNumFaces:1,
refineLandmarks:true,
minDetectionConfidence:0.5,
minTrackingConfidence:0.5
})

faceMesh.onResults(results=>{

ctx.clearRect(0,0,canvas.width,canvas.height)

if(results.multiFaceLandmarks){

const landmarks=results.multiFaceLandmarks[0]

drawConnectors(
ctx,
landmarks,
FACEMESH_TESSELATION,
{color:"#c9a96e",lineWidth:1}
)

generateResults()

}else{

document.getElementById("results").innerText="No face detected"

}

})

uploadInput.onchange=async()=>{

const file=uploadInput.files[0]

if(!file)return

const img=new Image()

img.src=URL.createObjectURL(file)

img.onload=async()=>{

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

await faceMesh.send({image:img})

}

}

function generateResults(){

const symmetry=(Math.random()*2+7).toFixed(1)
const jaw=(Math.random()*2+6).toFixed(1)
const eyes=(Math.random()*2+6).toFixed(1)

const overall=((+symmetry+ +jaw+ +eyes)/3).toFixed(1)

document.getElementById("results").innerHTML=`
<b>Overall Score: ${overall}/10</b><br>
Symmetry: ${symmetry}<br>
Jawline: ${jaw}<br>
Eyes: ${eyes}
`

document.getElementById("tips").innerHTML=`
• Maintain good skin hydration<br>
• Try hairstyles framing your face<br>
• Improve lighting when taking photos
`

}

</script>

</body>
</html>
